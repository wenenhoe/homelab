---
# Play 1 — System setup on all hosts (no containers started yet).
# Covers docker engine and the app_registry resolve, which is all Play 2/3
# need from here: bind9 and caddy just need compose_apps already resolved
# in hostvars, not any per-app files on disk yet — those are provisioned
# just before each app actually starts (its own play for caddy/bind9, or
# Play 4 for everything else).
- name: System setup
  hosts: all
  gather_facts: true
  become: true
  vars_prompt:
    - name: main_domain
      prompt: "Enter the main domain"
    - name: digitalocean_api_key
      prompt: "Enter the DigitalOcean API Key"
      private: true
      confirm: true
    - name: letsencrypt_email
      prompt: "Enter the email for LetsEncrypt"
      private: false
    - name: telegram_token
      prompt: "Enter the Telegram Token for Diun"
      private: true
    - name: telegram_chat_id
      prompt: "Enter the Telegram Chat ID for Diun"
      private: true
    - name: wetty_ssh_host
      prompt: "Enter the default Wetty SSH Host"
      private: false
    - name: tinyauth_ldap_observer_password
      prompt: "Enter the Tinyauth LDAP Observer password"
      private: true
      confirm: true
  roles:
    - role: docker
      tags:
        - initial-setup
    - role: compose_app
      tasks_from: resolve # noqa: var-naming[no-role-prefix]

# Play 2 — Caddy generates its config, builds its image, and deploys/
# restarts itself, so it's already routing before anything else comes up
# behind it.
- name: Deploy Caddy
  hosts: all
  gather_facts: false
  become: true
  roles:
    - role: caddy

# Play 3 — DNS config written and the bind9 container deployed/restarted
# before any other container starts, and before this host's Docker daemon
# is pointed at it for resolution. hostvars for all app hosts is already
# populated from play 1.
- name: Configure BIND9 on the DNS host
  hosts: dns
  gather_facts: false
  become: true
  roles:
    - role: bind9

# Play 4 — Every remaining compose app is provisioned and started now that
# DNS is already serving the zones and caddy is already routing. bind9 and
# caddy are excluded here since they resolved/provisioned/deployed
# themselves in Play 1 / Play 2 / Play 3.
- name: Deploy Compose apps
  hosts: all
  gather_facts: false
  become: true
  roles:
    - role: compose_app
      tasks_from: deploy # noqa: var-naming[no-role-prefix]
