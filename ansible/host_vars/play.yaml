---
caddy_domain: "play.{{ lab_domain }}"

compose_apps:
  - name: caddy

  - name: minecraft
    caddy:
      - host: bluemap
    create_dirs:
      - data
      - backups
    scripts:
      - run_upgrade.sh
    exclude:
      - scripts/run_restore.sh

  - name: diun

# ---------------------------------------------------------------------------
# BIND9 — per-host zone config
# ---------------------------------------------------------------------------

dns_ddns_target: "play.{{ ddns_domain }}."

dns_zones:
  - zone: "{{ caddy_domain }}"
    ttl: 3600
    soa_email: "hostmaster.{{ main_domain }}."
    serial: 2024010101   # overwritten at render time by the role
    extra_records:
      - { name: "@", type: NS, value: "ns1.{{ caddy_domain }}." }
      - { name: "ns1", type: A, value: "127.0.0.1" }
      - { name: "mc", type: CNAME, value: "{{ dns_ddns_target }}"}
