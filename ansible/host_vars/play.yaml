---
caddy_domain: play.example.com

compose_apps:
  - name: caddy

  - name: minecraft
    caddy:
      - host: bluemap

  - name: diun

# ---------------------------------------------------------------------------
# BIND9 — per-host zone config
# ---------------------------------------------------------------------------

dns_ddns_target: play.internal.example.com.

dns_zones:
  play.example.com:
    ttl: 3600
    soa_email: "hostmaster.example.com."
    serial: 2024010101   # overwritten at render time by the role
    extra_records:
      - { name: "@",   type: NS,    value: "ns1.{{ caddy_domain }}." }
      - { name: "ns1", type: A,     value: "127.0.0.1" }
      - { name: "mc",  type: CNAME, value: "play.internal.example.com."}
