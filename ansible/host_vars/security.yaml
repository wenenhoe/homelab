---
caddy_domain: "sec.{{ lab_domain }}"

lldap_host: lldap

compose_apps:
  - name: caddy

  - name: tinyauth

  - name: lldap
    caddy:
      default:
        host: "{{ lldap_host }}"

  - name: diun

# ---------------------------------------------------------------------------
# BIND9 — per-host zone config
# ---------------------------------------------------------------------------

# OPNsense DDNS record this host resolves to.
dns_ddns_target: "security.{{ ddns_domain }}."

# Zone name mirrors the caddy_domain so all Caddy-fronted service FQDNs
# (host + '.' + caddy_domain) fall inside this zone automatically.
dns_zones:
  - zone: "{{ lab_domain }}"
    ttl: 3600
    soa_email: "hostmaster.{{ main_domain }}."
    serial: 2024010101   # overwritten at render time by the role
    extra_records:
      - { name: "@", type: NS, value: "ns1.{{ lab_domain }}." }
      - { name: "ns1", type: A, value: "127.0.0.1" }
      - { name: "sso", type: CNAME, value: "{{ dns_ddns_target }}" }
  - zone: "{{ caddy_domain }}"
    ttl: 3600
    soa_email: "hostmaster.{{ main_domain }}."
    serial: 2024010101   # overwritten at render time by the role
    extra_records:
      - { name: "@", type: NS, value: "ns1.{{ caddy_domain }}." }
      - { name: "ns1", type: A, value: "127.0.0.1" }
