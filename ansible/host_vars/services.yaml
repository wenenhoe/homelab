---
caddy_domain: svc.example.com

cobalt_host: cobalt
shlink_short_host: short
shlink_web_host: shlink

compose_apps:
  - name: caddy
    build: true

  - name: bentopdf
    caddy:
      - host: bentopdf

  - name: cobalt
    caddy:
      - host: "{{ cobalt_host }}"

  - name: dashy
    caddy:
      - host: dashy

  - name: kms
    caddy:
      - host: kms

  - name: openspeedtest
    caddy:
      - host: speedtest

  - name: shlink
    caddy:
      - host: "{{ shlink_short_host }}"
      - host: "{{ shlink_web_host }}"

  - name: wastebin
    caddy:
      - host: wastebin

  - name: wetty
    caddy:
      - host: wetty

  - name: diun
