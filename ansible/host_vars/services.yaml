---
caddy_domain: "svc.{{ lab_domain }}"

cobalt_host: cobalt
shlink_short_host: short
shlink_web_host: shlink

compose_apps:
  - name: caddy

  - name: bind9

  - name: bentopdf
    caddy:
      - host: bentopdf

  - name: cobalt
    caddy:
      - host: "{{ cobalt_host }}"

  - name: dashy
    caddy:
      - host: dashy
    create_dirs:
      - data
    templates:
      - src: dashy.conf.yaml
        dest: "data/conf.yml"

  - name: kms
    caddy:
      - host: kms
    create_dirs:
      - data

  - name: openspeedtest
    caddy:
      - host: speedtest

  - name: shlink
    caddy:
      - host: "{{ shlink_short_host }}"
      - host: "{{ shlink_web_host }}"

  - name: wastebin
    caddy:
      - host: wastebin
    create_dirs:
      - data

  - name: wetty
    caddy:
      - host: wetty

  - name: diun

# ---------------------------------------------------------------------------
# BIND9 — per-host zone config
# ---------------------------------------------------------------------------

# OPNsense DDNS record this host resolves to.
dns_ddns_target: "services.{{ ddns_domain }}."

# Zone name mirrors the caddy_domain so all Caddy-fronted service FQDNs
# (host + '.' + caddy_domain) fall inside this zone automatically.
dns_zones:
  - zone: "{{ caddy_domain }}"
    ttl: 3600
    soa_email: "hostmaster.{{ main_domain }}."
    serial: 2024010101   # overwritten at render time by the role
    extra_records:
      - { name: "@", type: NS, value: "ns1.{{ caddy_domain }}." }
      - { name: "ns1", type: A, value: "127.0.0.1" }
