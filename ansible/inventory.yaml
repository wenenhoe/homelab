---
all:
  vars:
    ansible_ssh_private_key_file: ~/.ssh/proxmox_vm_servers
    ansible_become_exe: /usr/bin/sudo.ws
    # For Ubuntu 26.04, use non-rs sudo. Source: https://askubuntu.com/a/1566915

  children:
    test:
      hosts:
        experiment:
          ansible_host: ansible-test-server.internal.example.com
          ansible_user: user

    prod:
      hosts:
        services:
          ansible_host: services.internal.example.com
          ansible_user: svcadmin
        play:
          ansible_host: play.internal.example.com
          ansible_user: playadmin
        security:
          ansible_host: security.internal.example.com
          ansible_user: secadmin

    # Hosts whose dns_zones, compose_apps, caddy_domain, and dns_ddns_target
    # are scraped by the bind9 role.  Add any new app host here.
    app_hosts:
      children:
        prod:

    # The single authoritative DNS host.  bind9 role runs here only.
    dns:
      hosts:
        services:
