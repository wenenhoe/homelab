---
all:
  vars:
    ansible_ssh_private_key_file: ~/.ssh/proxmox_vm_servers
    ansible_become_exe: /usr/bin/sudo.ws
    # For Ubuntu 26.04, use non-rs sudo. Source: https://askubuntu.com/a/1566915

  children:
    test:
      hosts:
        experiment:
          ansible_host: ansible-test-server.internal.example.com
          ansible_user: user

    prod:
      hosts:
        services:
          ansible_host: services.internal.example.com
          ansible_user: svcadmin
        play:
          ansible_host: play.internal.example.com
          ansible_user: playadmin
