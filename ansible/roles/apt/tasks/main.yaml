---
- name: Ensure the system is Debian-based
  ansible.builtin.assert:
    that:
      - ansible_facts["os_family"] == "Debian"
    fail_msg: "This role can only be run on Debian/Ubuntu-based systems."

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: "{{ apt_upgrade_type | default('safe') }}"
    cache_valid_time: 3600
  register: apt_result

- name: Check if a reboot is required
  ansible.builtin.stat:
    path: /var/run/reboot-required
  register: apt_reboot_required_file

- name: Reboot the server if required
  ansible.builtin.reboot:
    msg: "Reboot initiated by Ansible due to package upgrades"
    connect_timeout: 5
    reboot_timeout: 600
    pre_reboot_delay: 0
    post_reboot_delay: 30
    test_command: whoami
  when: apt_reboot_required_file.stat.exists
