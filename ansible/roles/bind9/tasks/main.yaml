---
# ---------------------------------------------------------------------------
# Role: bind9
# Runs on the dedicated DNS host.  Zone data is scraped from every host in
# the 'app_hosts' group via hostvars — no zone config lives on the DNS host
# itself.  host_vars for app hosts are completely unchanged.
#
# Variable ownership:
#   group_vars/all.yaml       — dns_deploy_dir, dns_config_dir
#   host_vars/<app-host>.yaml — dns_zones, dns_ddns_target,
#                               caddy_domain, compose_apps
# ---------------------------------------------------------------------------

- name: Ensure BIND9 configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: 100
    group: 101
    mode: '0755'
  loop:
    - "{{ dns_config_dir }}"
    - "{{ dns_config_dir }}/zones"
    - "{{ dns_deploy_dir }}/cache"
    - "{{ dns_deploy_dir }}/records"

- name: Compute DNS serial (Unix epoch)
  ansible.builtin.set_fact:
    bind9_dns_serial: "{{ now(fmt='%s') | int }}"

# ---------------------------------------------------------------------------
# Scrape every app host's dns_zones via hostvars and flatten into _all_zones.
#
# _all_zones is a list of dicts.  Each entry is one zone and carries all the
# context the templates need so they don't have to reach into hostvars again:
#
#   key             — zone name (e.g. "svc.example.com")
#   value           — zone SOA/TTL/extra_records with serial already injected
#   dns_ddns_target — the DDNS target for that host's zone
#   caddy_domain    — used by zone_db.j2 to build + filter FQDNs
#   compose_apps    — service list to derive CNAMEs from
#
# Using a Jinja2 expression in set_fact to do the double iteration in one
# task avoids the two-loop YAML problem entirely.
# ---------------------------------------------------------------------------
- name: Collect and flatten zones from all app hosts
  ansible.builtin.set_fact:
    bind9_all_zones: >-
      {%- set result = [] -%}
      {%- for host in groups['app_hosts'] -%}
        {%- set hv = hostvars[host] -%}
        {%- for zone_name, zone_data in hv.dns_zones.items() -%}
          {%- set _ = result.append({
            'key':             zone_name,
            'value':           zone_data | combine({'serial': bind9_dns_serial}),
            'dns_ddns_target': hv.dns_ddns_target,
            'caddy_domain':    hv.caddy_domain,
            'compose_apps':    hv.compose_apps
          }) -%}
        {%- endfor -%}
      {%- endfor -%}
      {{ result }}

- name: Generate named.conf
  ansible.builtin.template:
    src: named.conf.j2
    dest: "{{ dns_config_dir }}/named.conf"
    owner: 100
    group: 101
    mode: '0644'
  register: bind9_named_conf

- name: Generate named.conf.local
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: "{{ dns_config_dir }}/named.conf.local"
    owner: 100
    group: 101
    mode: '0644'
  register: bind9_named_local

# ---------------------------------------------------------------------------
# Smart zone-file deployment — ignore serial changes in the diff so we don't
# reload BIND on every run just because the epoch serial ticked forward.
#
# Strategy:
#   1. Render the template into a side-car temp file (.new) on the remote.
#   2. Strip the serial line from both the .new file and the live file (if it
#      exists) and compare the remainder with diff.
#   3. Only overwrite the live file (and mark changed) when the non-serial
#      content actually differs.
#   4. Remove the temp file regardless.
# ---------------------------------------------------------------------------

- name: Render zone files to temp path for diffing
  ansible.builtin.template:
    src: zone.db.j2
    dest: "{{ dns_config_dir }}/zones/db.{{ item.key }}.new"
    owner: 100
    group: 101
    mode: '0644'
  loop: "{{ bind9_all_zones }}"
  vars:
    zone_name: "{{ item.key }}"
    zone_data: "{{ item.value }}"
    dns_ddns_target: "{{ item.dns_ddns_target }}"
    caddy_domain: "{{ item.caddy_domain }}"
    compose_apps: "{{ item.compose_apps }}"

- name: Diff zone files ignoring serial line
  ansible.builtin.shell: |
    live="{{ dns_config_dir }}/zones/db.{{ item.key }}"
    new="${live}.new"

    strip_serial() {
      # Removes the line that contains only digits followed by " ; Serial"
      # Matches the SOA serial comment format produced by zone.db.j2:
      #   "        1234567890 ; Serial"
      sed '/^[[:space:]]*[0-9]\+[[:space:]]*;[[:space:]]*Serial/Id' "$1"
    }

    if [ ! -f "$live" ]; then
      echo "NO_LIVE_FILE"
      exit 0
    fi

    if diff <(strip_serial "$live") <(strip_serial "$new") > /dev/null 2>&1; then
      echo "SAME"
    else
      echo "DIFFERENT"
    fi
  args:
    executable: /bin/bash
  loop: "{{ bind9_all_zones }}"
  register: bind9_zone_diff
  changed_when: false   # purely a read — the copy task below owns the change signal

- name: Promote new zone file when content has changed
  ansible.builtin.shell: |
    new="{{ dns_config_dir }}/zones/db.{{ item.item.key }}.new"
    live="{{ dns_config_dir }}/zones/db.{{ item.item.key }}"
    cp -a "$new" "$live"
  args:
    executable: /bin/bash
  loop: "{{ bind9_zone_diff.results }}"
  when: item.stdout in ['DIFFERENT', 'NO_LIVE_FILE']
  register: bind9_zone_promote
  changed_when: true

- name: Remove temp zone files
  ansible.builtin.file:
    path: "{{ dns_config_dir }}/zones/db.{{ item.key }}.new"
    state: absent
  loop: "{{ bind9_all_zones }}"

- name: Set a consolidated DNS change flag
  ansible.builtin.set_fact:
    bind9_dns_changed: >-
      {{
        bind9_named_conf.changed or
        bind9_named_local.changed or
        (bind9_zone_promote.results
         | default([])
         | selectattr('changed', 'equalto', true)
         | list | length > 0)
      }}

- name: Disable DNS Stub Listener and set Docker DNS
  ansible.builtin.import_tasks:
    file: network_conf.yaml
