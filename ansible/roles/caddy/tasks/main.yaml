---
- name: Init caddy's own compose app files and directories
  ansible.builtin.include_role:
    name: compose_app
    tasks_from: init
  vars:
    compose_app_item: "{{ compose_apps | selectattr('name', 'equalto', 'caddy') | first }}"
  when: compose_apps | selectattr('name', 'equalto', 'caddy') | list | length > 0

- name: Deploy Caddyfile from template and host_vars
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "{{ compose_deploy_dir }}/caddy/Caddyfile"
    owner: root
    group: root
    mode: "0644"
  register: caddy_config_changes

- name: Create Dockerfile for custom Caddy build
  ansible.builtin.copy:
    dest: "{{ compose_deploy_dir }}/caddy/Dockerfile"
    owner: root
    group: root
    mode: "0644"
    content: |
      FROM caddy:builder AS builder
      RUN xcaddy build --with github.com/caddy-dns/digitalocean
      FROM caddy:latest
      COPY --from=builder /usr/bin/caddy /usr/bin/caddy

- name: Build custom Caddy image locally using standard Dockerfile
  community.docker.docker_image_build:
    name: caddy-digitalocean
    tag: v1.0
    path: "{{ compose_deploy_dir }}/caddy" # Point context to where the Dockerfile lives
    pull: true
    nocache: true
    dockerfile: Dockerfile

- name: Deploy and restart caddy now that its config/image is ready
  ansible.builtin.include_role:
    name: compose_app
    tasks_from: deploy
  vars:
    compose_app_item: "{{ compose_apps | selectattr('name', 'equalto', 'caddy') | first }}"
    compose_app_extra_changed: "{{ caddy_config_changes.changed }}"
  when: compose_apps | selectattr('name', 'equalto', 'caddy') | list | length > 0
