---
# bind9 and caddy already deployed (and restarted, if needed) themselves in
# Play 1 / Play 2 — see roles/caddy and roles/bind9. Everything else gets
# deployed here, generically, via the shared compose_app role.
- name: Deploy remaining compose apps
  ansible.builtin.include_role:
    name: compose_app
    tasks_from: main
  vars:
    compose_app_item: "{{ item }}"
  loop: "{{ compose_apps | rejectattr('name', 'in', compose_self_managed_apps | default(['bind9', 'caddy'])) | list }}"
  loop_control:
    label: "{{ item.name }}"
