---
# Convenience entrypoint (resolve then deploy) for callers that don't need
# the Play 1 / Play 4 split — e.g. ad-hoc runs. deploy.yaml itself calls
# resolve.yaml and deploy.yaml separately, in Play 1 and Play 4
# respectively, since caddy and bind9 need to run in between.
- name: Initialise docker compose apps
  ansible.builtin.import_tasks: resolve.yaml

- name: Deploy docker compose apps
  ansible.builtin.import_tasks: deploy.yaml
