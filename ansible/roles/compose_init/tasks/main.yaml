---
# ---------------------------------------------------------------------------
# Resolve each host's compose_apps against the app_registry defaults
# (group_vars/all.yaml) before doing anything else. After this task, every
# compose_apps entry carries its full set of create_dirs / scripts /
# templates / configs / env / caddy upstream+auth, regardless of whether
# the host_vars file declared them explicitly - it only needs to declare
# the app name and, for routable apps, its caddy hostname(s).
#
# `caddy` is a dict keyed by route id (`default` for single-route apps, a
# descriptive key for multi-route apps like shlink's `short`/`web`), so a
# plain recursive combine() merges each route's registry-defined
# upstream/auth with the host-defined hostname automatically
# ---------------------------------------------------------------------------
- name: Merge app registry defaults into each compose app definition
  ansible.builtin.set_fact:
    compose_init_compose_apps_resolved: "{{ (current_list | list) + [merged_app] }}"
  loop: "{{ compose_apps }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    current_list: "{{ compose_init_compose_apps_resolved | default([]) }}"
    registry_defaults: "{{ app_registry[item.name] | default({}) }}"
    merged_app: "{{ registry_defaults | combine(item, recursive=True) }}"

- name: Replace compose_apps with the fully-resolved definitions
  ansible.builtin.set_fact:
    compose_init_compose_apps: "{{ compose_init_compose_apps_resolved }}"

- name: Ensure stacks directory exists
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Ensure app deploy directory exists
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}/{{ item.name }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ compose_init_compose_apps }}"

- name: Ensure app data directories exist
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}/{{ item.0.name }}/{{ item.1 }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ compose_init_compose_apps | subelements('create_dirs', skip_missing=True) }}"

- name: Find compose files on the controller
  ansible.builtin.find:
    paths: "{{ compose_source_dir }}/{{ item.name }}/"
    patterns: "compose*.yaml"
  loop: "{{ compose_init_compose_apps }}"
  register: compose_init_compose_files_raw
  delegate_to: localhost

- name: Flatten compose files list
  ansible.builtin.set_fact:
    compose_init_compose_files: "{{ compose_init_compose_files_raw.results | map(attribute='files') | flatten }}"

- name: Copy compose files to remote host
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ compose_deploy_dir }}/{{ item.path | regex_replace('^' ~ compose_source_dir ~ '/', '') }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  loop: "{{ compose_init_compose_files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Copy scripts to remote host
  ansible.builtin.copy:
    src: "{{ compose_source_dir }}/{{ item.0.name }}/scripts/{{ item.1 }}"
    dest: "{{ compose_deploy_dir }}/{{ item.0.name }}/scripts/{{ item.1 }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ compose_init_compose_apps | subelements('scripts', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}/scripts/{{ item.1 }}"

- name: Deploy .env from template
  ansible.builtin.template:
    src: "{{ item.name }}.env.j2"
    dest: "{{ compose_deploy_dir }}/{{ item.name }}/.env"
    force: false          # never overwrites an existing .env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  loop: "{{ compose_init_compose_apps }}"
  when: item.env | default(false)
  no_log: true

- name: Deploy additional template files
  ansible.builtin.template:
    src: "{{ item.1.src }}"
    dest: "{{ compose_deploy_dir }}/{{ item.0.name }}/{{ item.1.dest }}"
    owner: "{{ item.1.owner | default(ansible_user) }}"
    group: "{{ item.1.group | default(ansible_user) }}"
    mode: "{{ item.1.mode | default('0644') }}"
    force: "{{ item.1.force | default(true) }}"
  loop: "{{ compose_init_compose_apps | subelements('templates', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}/{{ item.1.dest }}"
  no_log: "{{ item.1.no_log | default(false) }}"

- name: Copy additional config files
  ansible.builtin.copy:
    src: "{{ compose_source_dir }}/{{ item.0.name }}/configs/{{ item.1.src }}"
    dest: "{{ compose_deploy_dir }}/{{ item.0.name }}/{{ item.1.dest }}"
    owner: "{{ item.1.owner | default(ansible_user) }}"
    group: "{{ item.1.group | default(ansible_user) }}"
    mode: "{{ item.1.mode | default('0644') }}"
    force: "{{ item.1.force | default(true) }}"
  loop: "{{ compose_init_compose_apps | subelements('configs', skip_missing=True) }}"
  loop_control:
    label: "{{ item.0.name }}/configs/{{ item.1.dest }}"
  no_log: "{{ item.1.no_log | default(false) }}"

- name: Remove excluded files
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}/{{ item.0.name }}/{{ item.1 }}"
    state: absent
  loop: "{{ compose_init_compose_apps | subelements('exclude', skip_missing=True) }}"
