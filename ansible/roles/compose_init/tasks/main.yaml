---
# ---------------------------------------------------------------------------
# Resolve each host's compose_apps against the app_registry defaults
# (group_vars/all.yaml) before doing anything else. After this task,
# compose_apps itself is replaced with the fully-resolved list — every
# entry carries its full set of create_dirs / scripts / templates / configs
# / env / caddy upstream+auth, regardless of whether the host_vars file
# declared them explicitly. It only needs to declare the app name and, for
# routable apps, its caddy hostname(s).
#
# This MUST run for every app on every host, unconditionally — bind9 (Play
# 2) scrapes the resolved compose_apps back out of hostvars to build CNAMEs,
# and caddy/bind9 below need their own resolved entry too.
#
# `caddy` is a dict keyed by route id (`default` for single-route apps, a
# descriptive key for multi-route apps like shlink's `short`/`web`), so a
# plain recursive combine() merges each route's registry-defined
# upstream/auth with the host-defined hostname automatically.
#
# Using a Jinja2 expression in set_fact to do the double iteration in one
# task avoids the two-loop YAML problem entirely.
# ---------------------------------------------------------------------------
- name: Merge app registry defaults into each compose app definition
  ansible.builtin.set_fact:
    compose_init_compose_apps_resolved: "{{ (current_list | list) + [merged_app] }}"
  loop: "{{ compose_apps }}"
  loop_control:
    label: "{{ item.name }}"
  vars:
    current_list: "{{ compose_init_compose_apps_resolved | default([]) }}"
    registry_defaults: "{{ app_registry[item.name] | default({}) }}"
    merged_app: "{{ registry_defaults | combine(item, recursive=True) }}"

- name: Replace compose_apps with the fully-resolved definitions
  ansible.builtin.set_fact:
    compose_apps: "{{ compose_init_compose_apps_resolved }}" # noqa: var-naming[no-role-prefix]

- name: Ensure stacks directory exists
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# bind9 and caddy own their own init/deploy sequencing (see roles/bind9 and
# roles/caddy) so they can generate their config and bring their container
# up in the right order relative to everything else. Every other app is
# initialized here, generically, via the shared compose_app role.
- name: Init each app's files and directories
  ansible.builtin.include_role:
    name: compose_app
    tasks_from: init
  vars:
    compose_app_item: "{{ item }}"
  loop: "{{ compose_apps | rejectattr('name', 'in', compose_self_managed_apps | default(['bind9', 'caddy'])) | list }}"
  loop_control:
    label: "{{ item.name }}"
