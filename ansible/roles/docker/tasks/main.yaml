---
# ---------------------------------------------------------------------------
# Installs Docker Engine from Docker's official apt repo (DEB822 format,
# GPG-verified). Run in deploy.yaml's Play 1 (tags: initial-setup), ahead
# of every other role, since Caddy/BIND9/compose apps all need it.
#
# Also adds every account in `docker_users` (group_vars/all.yaml, defaults
# to just `ansible_user`) to the `docker` group so it can run `docker`
# without sudo. Idempotent: re-running after Docker is already installed
# just confirms the repo/packages/group state and does nothing further.
# ---------------------------------------------------------------------------

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Create /etc/apt/keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    owner: root
    group: root

- name: Add Docker official apt repository using DEB822 format
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: ["https://download.docker.com/linux/ubuntu"]
    suites: ["{{ ansible_facts['distribution_release'] }}"]
    components: [stable]
    architectures: ["{{ ansible_facts['architecture'] | replace('x86_64', 'amd64') }}"]
    signed_by: /etc/apt/keyrings/docker.asc
    state: present
    enabled: true

- name: Install Docker Engine
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Enable and start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Add users to docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users | default([]) }}"
  when: docker_users is defined and docker_users | length > 0
