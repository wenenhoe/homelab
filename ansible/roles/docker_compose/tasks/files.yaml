---
- name: Ensure app deploy directory exists
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}/{{ item.name }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ compose_apps }}"

- name: Copy compose files and configs to server
  ansible.builtin.copy:
    src: "{{ item.src_dir }}/"
    dest: "{{ compose_deploy_dir }}/{{ item.name }}/"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  loop: "{{ compose_apps }}"

- name: Copy correct Caddyfile for this host
  ansible.builtin.copy:
    src: "{{ item.src_dir }}/Caddyfile.{{ inventory_hostname_short }}"
    dest: "{{ compose_deploy_dir }}/{{ item.name }}/Caddyfile"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ compose_apps }}"
  when: item.name == "caddy"

- name: Ensure app data directory exists
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}/{{ item.name }}/data"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  loop: "{{ compose_apps }}"
  when: item.name in ["kms", "wastebin"]

- name: Remove excluded files
  ansible.builtin.file:
    path: "{{ compose_deploy_dir }}/{{ item.0.name }}/{{ item.1 }}"
    state: absent
  loop: "{{ compose_apps | subelements('exclude', skip_missing=True) }}"

- name: Deploy .env from template
  ansible.builtin.template:
    src: "{{ item.name }}.env.j2"
    dest: "{{ compose_deploy_dir }}/{{ item.name }}/.env"
    force: false          # never overwrites an existing .env
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0600"
  loop: "{{ compose_apps }}"
  when: item.has_env | default(false)
  no_log: true
