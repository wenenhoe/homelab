appConfig:
  theme: colorful
  layout: auto
  colCount: 3
  iconSize: medium
  language: en
pageInfo:
  title: Homelab
  description: Service Dashboard
  navLinks:
    - title: Dashy
      path: 'https://dashy.svc.{{ lab_domain }}'
sections:
  - name: Infrastructure Management
    icon: fas fa-network-wired
    items:
      - title: Proxmox
        description: Hypervisor
        icon: si-proxmox
        url: 'https://pve.{{ ddns_domain }}:8006'
        statusCheck: true
        id: 0_2558_proxmox
      - title: Tailscale
        description: Peer-to-peer Mesh VPN
        icon: si-tailscale
        url: https://login.tailscale.com/admin/machines
        id: 1_2558_tailscale
      - title: DigitalOcean
        description: DNS Management
        icon: si-digitalocean
        url: 'https://cloud.digitalocean.com/networking/domains/{{ main_domain }}'
        id: 2_2558_digitalocean
      - title: KMS Server
        description: Windows & Office activation
        icon: fab fa-microsoft
        url: 'https://kms.svc.{{ lab_domain }}'
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 3_2558_kmsserver
  - name: Service Management
    icon: fas fa-cubes
    items:
      - title: OPNsense
        description: Firewall & router management
        icon: si-opnsense
        url: 'https://opnsense.{{ ddns_domain }}'
        statusCheck: true
        id: 0_1774_opnsense
      - title: Wetty
        description: Terminal in browser
        icon: fas fa-terminal
        url: 'https://wetty.svc.{{ lab_domain }}/?host=@'
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 3_1774_wetty
  - name: Game Tools
    icon: fa fa-gamepad
    items:
      - title: Bluemap
        description: Minecraft mapping tool
        url: 'https://bluemap.play.{{ lab_domain }}'
        icon: hl-bluemap
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 0_939_bluemap
      - title: Chunkbase
        description: Minecraft seed map
        icon: https://www.chunkbase.com/favicon.ico
        url: https://www.chunkbase.com/apps/seed-map#seed=4275597651341476839
        id: 1_939_chunkbase
  - name: Tools & Utilities
    icon: fas fa-wrench
    items:
      - title: Speedtest
        description: Local network speed test
        url: 'https://speedtest.svc.{{ lab_domain }}'
        icon: fas fa-tachometer-alt
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 0_1587_speedtest
      - title: Cobalt
        description: Media downloader API
        url: 'https://cobalt.svc.{{ lab_domain }}'
        icon: fas fa-download
        statusCheck: true
        id: 1_1587_cobalt
      - title: BentoPDF
        description: PDF tools & utilities
        url: 'https://bentopdf.svc.{{ lab_domain }}'
        icon: fas fa-file-pdf
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 2_1587_bentopdf
  - name: Link Management & Pastebin
    icon: fas fa-link
    items:
      - title: Shlink
        description: URL shortener management UI
        url: 'https://shlink.svc.{{ lab_domain }}'
        icon: fas fa-cut
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 0_2375_shlink
      - title: Short URL
        description: Public short link endpoint
        url: 'https://short.svc.{{ lab_domain }}'
        icon: fas fa-external-link-alt
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 1_2375_shorturl
      - title: Wastebin
        description: Pastebin / snippet sharing
        url: 'https://wastebin.svc.{{ lab_domain }}'
        icon: fas fa-paste
        statusCheck: true
        statusCheckAcceptCodes: '401'
        id: 2_2375_wastebin
pages: []
