name: beszel-agent

services:
  beszel-agent:
    image: henrygd/beszel-agent:0.18-alpine
    container_name: beszel-agent
    volumes:
      - ./data:/var/lib/beszel-agent
    environment:
      DOCKER_HOST: tcp://localhost:2375
    env_file:
      - .env
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "/agent", "health" ]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
    ports:
      - '127.0.0.1:2375:2375'
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2375/version" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
