name: beszel-agent

services:
  beszel-agent:
    image: henrygd/beszel-agent:0.18-alpine
    container_name: beszel-agent
    volumes:
      - ./data:/var/lib/beszel-agent
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - .env
    network_mode: host
    restart: unless-stopped
