name: beszel-agent

services:
  beszel-agent:
    image: henrygd/beszel-agent:0.18-alpine
    container_name: beszel-agent
    volumes:
      - ./data:/var/lib/beszel-agent
    environment:
      DOCKER_HOST: tcp://localhost:2375
    env_file:
      - .env
    network_mode: host
    restart: unless-stopped
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
    ports:
      - '127.0.0.1:2375:2375'
    restart: unless-stopped
