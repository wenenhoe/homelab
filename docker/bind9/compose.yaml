name: bind9

services:
  bind9:
    image: ubuntu/bind9:9.20-26.04_edge
    volumes:
      - ./config:/etc/bind
      - ./cache:/var/cache/bind
      - ./records:/var/lib/bind
    environment:
      - TZ=${TIMEZONE}
    ports:
      - '0.0.0.0:53:53/tcp'
      - '0.0.0.0:53:53/udp'
    command: [ "exec", "/usr/sbin/named", "-g", "-4" ] # TODO: Handle new identity [ "-u", "bind" ]
    restart: unless-stopped
    user: 100:101
