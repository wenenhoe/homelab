name: dashy

services:
  dashy:
    image: lissy93/dashy:4.x
    volumes:
      - ./data:/app/user-data
    environment:
      - NODE_ENV=production
    networks:
      - caddy-proxy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - /app/services/healthcheck.js
      interval: 1m30s
      timeout: 10s
      retries: 3
      start_period: 30s
    user: 1000:1000
    expose:
      - '8080'
networks:
  caddy-proxy:
    external: true
