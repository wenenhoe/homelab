name: diun

services:
  diun:
    image: crazymax/diun:4
    container_name: diun
    depends_on:
      - dockerproxy
    volumes:
      - ./data:/data
    environment:
      TZ: ${TIMEZONE}
      LOG_LEVEL: info
      LOG_JSON: false
      DIUN_WATCH_WORKERS: 10
      DIUN_WATCH_SCHEDULE: 0 4 * * *
      DIUN_WATCH_JITTER: 30s
      DIUN_PROVIDERS_DOCKER: true
      DIUN_PROVIDERS_DOCKER_ENDPOINT: tcp://dockerproxy:2375
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: true
      DIUN_PROVIDERS_FILE_FILENAME: /data/conf.yaml
      DIUN_NOTIF_TELEGRAM_APIURL: https://api.telegram.org
      DIUN_NOTIF_TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DIUN_NOTIF_TELEGRAM_CHATIDS: ${TELEGRAM_CHAT_ID}
      DIUN_NOTIF_TELEGRAM_DISABLENOTIFICATION: false
    networks:
      - diun-net
      - docker-socket-proxy-net
    command: serve
    restart: always
    healthcheck:
      test: [ "CMD", "diun", "healthcheck" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
  dockerproxy:
    image: ghcr.io/tecnativa/docker-socket-proxy:v0.4.2
    container_name: diun-dockerproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - IMAGES=1
    networks:
      - docker-socket-proxy-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2375/version" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    expose:
      - '2375'
networks:
  diun-net:
  docker-socket-proxy-net:
    internal: true
