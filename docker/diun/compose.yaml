services:
  diun:
    image: crazymax/diun:latest
    command: serve
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      TZ: ${TIMEZONE}
      LOG_LEVEL: info
      LOG_JSON: false
      DIUN_WATCH_WORKERS: 10
      DIUN_WATCH_SCHEDULE: 0 4 * * *
      DIUN_WATCH_JITTER: 30s
      DIUN_PROVIDERS_DOCKER: true
      DIUN_PROVIDERS_DOCKER_WATCHBYDEFAULT: true
      DIUN_PROVIDERS_FILE_FILENAME: /data/conf.yaml
      DIUN_NOTIF_TELEGRAM_APIURL: https://api.telegram.org
      DIUN_NOTIF_TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      DIUN_NOTIF_TELEGRAM_CHATIDS: ${TELEGRAM_CHAT_ID}
      DIUN_NOTIF_TELEGRAM_DISABLENOTIFICATION: false
    restart: always
networks: {}
