name: dockge

services:
  dockge:
    image: louislam/dockge:1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - /opt/stacks:/opt/stacks
    environment:
      - DOCKGE_STACKS_DIR=/opt/stacks
    networks:
      - caddy-proxy
    restart: unless-stopped
    expose:
      - '5001'
networks:
  caddy-proxy:
    external: true
