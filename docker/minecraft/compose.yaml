name: minecraft

services:
  backups:
    image: itzg/mc-backup:2026.6.2
    depends_on:
      mc:
        condition: service_healthy
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
    environment:
      TZ: ${TIMEZONE}
      CRON_SCHEDULE: "0 4 * * *" # backup everyday at 4am
      CRON_BACKUP_UID: "1000"
      RCON_HOST: mc
    restart: always
    # TODO: Add healthcheck
    # NOTE: Runs on a cron schedule with no listening port/daemon in between
    # NOTE: Can consider looking into the logs daily with a custom script
  bluemap:
    image: ghcr.io/bluemap-minecraft/bluemap:v5
    volumes:
      - ./bluemap/config:/app/config
      - ./bluemap/web:/app/web
      - ./bluemap/data:/app/data
      - ./data/world:/app/world
    networks:
      - caddy-proxy
    command: -r -u -w
    restart: always
    # TODO: Add healthcheck
    # NOTE: Image has no wget/curl
    # NOTE: Can consider a sidecar/Dockerfile to compile a healthchecker JAR
    expose:
      - '8100'
  mc:
    image: itzg/minecraft-server:java25
    volumes:
      - ./data:/data
      - ./extras:/extras:ro
    environment:
      TZ: ${TIMEZONE}
      EULA: "TRUE"
      INIT_MEMORY: 1G
      MAX_MEMORY: 2G
      TYPE: FABRIC
      VERSION: 1.21.11
      MOTD: |
        §l§6🎣 My Forever World 🏹§r
        A %TYPE% server on %VERSION%
      MODRINTH_LOADER: fabric
      MODRINTH_DOWNLOAD_DEPENDENCIES: required
      MODRINTH_PROJECTS_DEFAULT_VERSION_TYPE: beta # "release"
      MODRINTH_MODPACK: simply-optimized-up-to-date
      MODRINTH_PROJECTS: "@/extras/modrinth-mods.txt"
    ports:
      - '0.0.0.0:25565:25565'
    restart: unless-stopped
    expose:
      - '25575' # RCON port
    stdin_open: true
    tty: true
networks:
  caddy-proxy:
    external: true
